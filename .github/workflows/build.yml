name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Install Tesseract OCR
        shell: powershell
        run: choco install tesseract --no-progress -y

      - name: Resolve version
        id: version
        shell: powershell
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            (Get-Content VERSION -Raw).Trim()
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: .\scripts\build_installer.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaliaHotpotReminder-Setup
          path: |
            dist/PaliaHotpotReminder-Setup-v${{ steps.version.outputs.version }}.exe
            dist/PaliaHotpotReminder-Setup-v${{ steps.version.outputs.version }}.exe.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releasesJson = gh release list --repo $env:GITHUB_REPOSITORY --limit 100 --json tagName
          if ($LASTEXITCODE -ne 0) {
            throw 'Unable to query existing GitHub releases.'
          }

          $releaseExists = @($releasesJson | ConvertFrom-Json | Where-Object { $_.tagName -eq $env:GITHUB_REF_NAME }).Count -gt 0
          if ($releaseExists) {
            Write-Host "GitHub release $env:GITHUB_REF_NAME already exists. Skipping release creation."
            exit 0
          }

          gh release create $env:GITHUB_REF_NAME `
            "dist/PaliaHotpotReminder-Setup-v${{ steps.version.outputs.version }}.exe#Palia Hotpot Reminder Setup" `
            "dist/PaliaHotpotReminder-Setup-v${{ steps.version.outputs.version }}.exe.sha256#SHA-256 checksum" `
            --title "Palia Hotpot Reminder $env:GITHUB_REF_NAME" `
            --notes "Installer-first Windows release with checksum verification support." `
            --generate-notes
